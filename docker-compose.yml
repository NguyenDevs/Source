version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: kpmtxq_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: U6bh0i3QTvGw1oEK
      MYSQL_DATABASE: kpmtxq_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  app:
    build: .
    container_name: kpmtxq_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=U6bh0i3QTvGw1oEK
      - DB_NAME=kpmtxq_db
      - PORT=3000
      - SESSION_SECRET=kpmtxq-secret-docker-2026
    volumes:
      - ./uploads:/app/uploads
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kpmtxq_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=U6bh0i3QTvGw1oEK
    depends_on:
      - db
volumes:
  mysql_data: