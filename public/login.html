<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — KPMTXQ 24-36T</title>
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/vendor/vendor.min.css">
    <link rel="stylesheet" href="assets/css/plugins/plugins.min.css">
    <link rel="stylesheet" href="assets/css/style.min.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-glass-card">
            <div class="auth-header">
                <div class="auth-logo-box">
                    <span>🔐</span>
                </div>
                <h1 class="auth-title">Chào mừng trở lại</h1>
                <p class="auth-subtitle">Truy cập hệ thống học liệu KPMTXQ 24-36T</p>
            </div>

            <div id="msgError" class="auth-form-error" style="display:none;"></div>
            <div id="msgSuccess" class="auth-form-success" style="display:none;"></div>

            <form onsubmit="event.preventDefault(); doLogin();" class="auth-form-body">
                <div class="auth-form-group">
                    <label class="auth-form-label" for="username">Tên đăng nhập</label>
                    <input type="text" id="username" class="auth-form-control" placeholder="Nhập tên của bạn..." required autocomplete="username">
                </div>

                <div class="auth-form-group">
                    <label class="auth-form-label" for="password">Mật khẩu</label>
                    <input type="password" id="password" class="auth-form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary btn-lg btn-auth w-100">
                    ĐĂNG NHẬP
                </button>
            </form>

            <div class="auth-footer">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>

            <div class="text-center">
                <a href="index.html" class="auth-back-home">
                    ← Quay về trang chủ
                </a>
            </div>
        </div>
    </div>




    <script src="assets/js/vendor/vendor.min.js"></script>
    <script src="assets/js/plugins/plugins.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
    const API = '/api';

    async function doLogin() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const err = document.getElementById('msgError');
        const suc = document.getElementById('msgSuccess');
        const btn = document.getElementById('loginBtn');

        err.style.display = 'none';
        suc.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Đang đăng nhập...';

        try {
            const res = await fetch(API + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (data.success) {
                suc.textContent = 'Đăng nhập thành công! Đang chuyển hướng...';
                suc.style.display = 'block';
                setTimeout(() => window.location.href = 'index.html', 800);
            } else {
                err.textContent = data.message || 'Đăng nhập thất bại.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'ĐĂNG NHẬP';
            }
        } catch (e) {
            err.textContent = 'Lỗi kết nối server. Vui lòng thử lại.';
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'ĐĂNG NHẬP';
        }
    }
    </script>
</body>
</html>
