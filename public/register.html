<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký — KPMTXQ 24-36T</title>
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/vendor/vendor.min.css">
    <link rel="stylesheet" href="assets/css/plugins/plugins.min.css">
    <link rel="stylesheet" href="assets/css/style.min.css">
    <link rel="stylesheet" href="assets/css/design-system.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-glass-card">
            <div class="auth-header">
                <div class="auth-logo-box">
                    <span>📝</span>
                </div>
                <h1 class="auth-title">Tạo tài khoản mới</h1>
                <p class="auth-subtitle">Tham gia đóng góp nội dung học liệu KPMTXQ</p>
            </div>

            <div id="msgError" class="auth-form-error" style="display:none;"></div>
            <div id="msgSuccess" class="auth-form-success" style="display:none;"></div>

            <form onsubmit="event.preventDefault(); doRegister();" class="auth-form-body">
                <div class="auth-form-group">
                    <label class="auth-form-label" for="username">Tên đăng nhập *</label>
                    <input type="text" id="username" class="auth-form-control" placeholder="Ít nhất 3 ký tự..." required minlength="3">
                </div>

                <div class="auth-form-group">
                    <label class="auth-form-label" for="email">Email</label>
                    <input type="email" id="email" class="auth-form-control" placeholder="email@example.com (tùy chọn)">
                </div>

                <div class="auth-form-group">
                    <label class="auth-form-label" for="password">Mật khẩu *</label>
                    <input type="password" id="password" class="auth-form-control" placeholder="Ít nhất 4 ký tự..." required minlength="4">
                </div>

                <div class="auth-form-group">
                    <label class="auth-form-label" for="role">Bạn là?</label>
                    <select id="role" class="auth-form-control">
                        <option value="student">Học sinh / Trẻ em</option>
                        <option value="teacher">Giáo viên / Phụ huynh</option>
                        <option value="user">Người dùng tự do</option>
                    </select>
                </div>

                <button type="submit" id="registerBtn" class="btn btn-primary btn-lg btn-auth w-100">
                    ĐĂNG KÝ TÀI KHOẢN
                </button>
            </form>

            <div class="auth-footer">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </div>

            <div class="text-center">
                <a href="index.html" class="auth-back-home">
                    ← Quay về trang chủ
                </a>
            </div>
        </div>
    </div>



    <script src="assets/js/vendor/vendor.min.js"></script>
    <script src="assets/js/plugins/plugins.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
    const API = '/api';

    async function doRegister() {
        const u = document.getElementById('username').value.trim();
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('password').value;
        const r = document.getElementById('role').value;
        const err = document.getElementById('msgError');
        const suc = document.getElementById('msgSuccess');
        const btn = document.getElementById('registerBtn');

        err.style.display = 'none';
        suc.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Đang đăng ký...';

        try {
            const res = await fetch(API + '/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ username: u, email: e, password: p, role: r })
            });
            const data = await res.json();
            if (data.success) {
                suc.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
                suc.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 1200);
            } else {
                err.textContent = data.message || 'Đăng ký thất bại.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'TẠO TÀI KHOẢN';
            }
        } catch (e) {
            err.textContent = 'Lỗi kết nối server.';
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'TẠO TÀI KHOẢN';
        }
    }
    </script>
</body>
</html>
