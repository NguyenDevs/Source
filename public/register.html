<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký — KPMTXQ 24-36T</title>
    <link rel="shortcut icon" href="assets/images/favicon.ico" type="image/png">
    <link rel="stylesheet" href="assets/css/vendor/vendor.min.css">
    <link rel="stylesheet" href="assets/css/plugins/plugins.min.css">
    <link rel="stylesheet" href="assets/css/style.min.css">
    <style>
        body { background: #b19361; }
        .login-wrapper { min-height: calc(100vh - 64px); display:flex; align-items:center; justify-content:center; padding: 20px; }
        .login-card { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.2); padding: 40px; width: 100%; max-width: 420px; }
        .login-card h3 { color: #b19361; text-align: center; margin-bottom: 5px; }
        .login-card p { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        .login-card label { font-weight: 600; color: #333; font-size: 14px; display: block; margin-bottom: 5px; }
        .login-card input, .login-card select { width: 100%; padding: 10px 12px; border: 2px solid #e2e2e2; border-radius: 8px; font-size: 14px; margin-bottom: 15px; transition: border-color .3s; box-sizing: border-box; font-family: inherit; }
        .login-card input:focus, .login-card select:focus { outline: none; border-color: #b19361; }
        .login-card button { width: 100%; padding: 12px; background: #b19361; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .3s; }
        .login-card button:hover { background: #9a7a4e; }
        .login-card button:disabled { background: #ccc; cursor: not-allowed; }
        .login-card .links { text-align: center; margin-top: 15px; font-size: 14px; color: #888; }
        .login-card .links a { color: #b19361; font-weight: 600; text-decoration: none; }
        .login-card .links a:hover { text-decoration: underline; }
        .login-card .error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; display: none; }
        .login-card .success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; display: none; }
        .login-card .back-link { text-align: center; margin-top: 20px; font-size: 13px; }
        .login-card .back-link a { color: rgba(255,255,255,.7); text-decoration: none; }
    </style>
</head>

<body>
    <header class="header-section d-none d-xl-block">
        <div class="header-wrapper">
            <div class="header-bottom header-bottom-color--golden section-fluid sticky-header sticky-color--golden">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-12 d-flex align-items-center justify-content-between">
                            <div class="header-logo">
                                <div class="logo"><a href="index.html"><img src="assets/images/logo/logo_black.png" alt=""></a></div>
                            </div>
                            <div class="main-menu menu-color--black menu-hover-color--golden">
                                <nav><ul>
                                    <li><a href="index.html">Trang Chủ</a></li>
                                    <li><a href="khai-niem.html">Khái niệm</a></li>
                                    <li><a href="muc-tieu.html">Mục tiêu</a></li>
                                    <li><a href="y-nghia.html">Ý nghĩa</a></li>
                                    <li><a href="noi-dung.html">Nội dung</a></li>
                                    <li><a href="kho-hoc-lieu.html">Kho học liệu AI</a></li>
                                    <li><a href="ve-chung-toi.html">Về chúng tôi</a></li>
                                </ul></nav>
                            </div>
                            <div class="header-action-link action-color--black action-hover-color--golden">
                                <a href="login.html" style="color:#b19361; font-weight:600;">Đăng nhập</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="login-wrapper">
        <div class="login-card">
            <div style="text-align:center; margin-bottom:20px;">
                <div style="font-size:48px;">👤</div>
                <h3>ĐĂNG KÝ TÀI KHOẢN</h3>
                <p>Tạo tài khoản để tham gia đóng góp nội dung</p>
            </div>

            <div id="msgError" class="error"></div>
            <div id="msgSuccess" class="success"></div>

            <form onsubmit="event.preventDefault(); doRegister();">
                <label for="username">Tên đăng nhập <span style="color:red;">*</span></label>
                <input type="text" id="username" placeholder="Ít nhất 3 ký tự..." required autocomplete="username">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="email@example.com (tùy chọn)" autocomplete="email">

                <label for="password">Mật khẩu <span style="color:red;">*</span></label>
                <input type="password" id="password" placeholder="Ít nhất 4 ký tự..." required autocomplete="new-password">

                <label for="role">Đăng ký với vai trò</label>
                <select id="role">
                    <option value="student">Học sinh</option>
                    <option value="teacher">Giáo viên</option>
                    <option value="user">Người dùng</option>
                </select>

                <button type="submit" id="regBtn">TẠO TÀI KHOẢN</button>
            </form>

            <div class="links">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </div>

            <div class="back-link">
                <a href="index.html">← Quay về trang chủ</a>
            </div>
        </div>
    </div>

    <script src="assets/js/vendor/vendor.min.js"></script>
    <script src="assets/js/plugins/plugins.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
    const API = '/api';

    async function doRegister() {
        const u = document.getElementById('username').value.trim();
        const e = document.getElementById('email').value.trim();
        const p = document.getElementById('password').value;
        const r = document.getElementById('role').value;
        const err = document.getElementById('msgError');
        const suc = document.getElementById('msgSuccess');
        const btn = document.getElementById('regBtn');

        err.style.display = 'none';
        suc.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Đang đăng ký...';

        try {
            const res = await fetch(API + '/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ username: u, email: e, password: p, role: r })
            });
            const data = await res.json();
            if (data.success) {
                suc.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
                suc.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 1200);
            } else {
                err.textContent = data.message || 'Đăng ký thất bại.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'TẠO TÀI KHOẢN';
            }
        } catch (e) {
            err.textContent = 'Lỗi kết nối server.';
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'TẠO TÀI KHOẢN';
        }
    }
    </script>
</body>
</html>
